<body>

<header><h2>Contact Task</h2></header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">☰</button>

    <div class="collapse navbar-collapse" id="nav">

<section class="contact-bg">
<div class="container text-center">

<h2>Contact Me</h2>

<form onsubmit="showMessage(event)">
  <input class="form-control mb-3" type="text" placeholder="Your Name" required>
  <input class="form-control mb-3" type="email" placeholder="Your Email" required>
  <textarea class="form-control mb-3" placeholder="Message" required></textarea>
  <button class="btn btn-danger">Send</button>
</form>

<div class="popup" id="popup">
  Message sent successfully!
</div>

</div>
</section>

<script>
function showMessage(e){
  e.preventDefault();
  document.getElementById("popup").style.display="block";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
